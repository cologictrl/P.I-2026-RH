name: rh_os
description: RH-OS - Sistema de Gestão de Recursos Humanos
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # Estado
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navegação
  go_router: ^13.2.0

  # Armazenamento local
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3

  # Seleção de arquivos
  file_picker: ^8.0.3

  # Leitura de PDF (texto digital)
  syncfusion_flutter_pdf: ^25.1.41

  # Gráficos (dashboard)
  fl_chart: ^0.68.0

  # Formatação de datas
  intl: ^0.19.0

  # Injeção de dependência
  get_it: ^7.7.0

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3
  firebase_crashlytics: ^4.1.3

  # IA / OCR
  google_generative_ai: ^0.4.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.3
  custom_lint: ^0.7.6
  riverpod_lint: ^2.3.10
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true